<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>document.documentElement.dataset.theme = localStorage.getItem('rs-theme') || 'dark';</script>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg" />
  <title>Notes · RS NOTES</title>
  <meta name="description" content="技术笔记与知识沉淀 —— Markdown、数学公式、代码高亮。" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
  <link rel="stylesheet" href="css/markdown.css" />

  <script src="config/site.config.js"></script>
</head>
<body>

  <header class="nav" data-nav></header>

  <main class="page">
    <div class="container">
      <div class="page-head reveal">
        <span class="eyebrow">02 / Notes</span>
        <h1>技术笔记</h1>
        <p>知识的沉淀 —— 支持标签筛选、搜索与阅读统计。点击标题进入阅读。</p>
      </div>

      <div class="notes-layout">
        <aside class="notes-sidebar reveal">
          <input class="notes-search" type="text" id="notesSearch" placeholder="搜索笔记标题或摘要…" />
          <h4>Tags</h4>
          <div class="tagcloud" data-tagcloud>
            <p class="muted" style="font-size:0.85rem;">加载中…</p>
          </div>
        </aside>

        <section class="notes-list" data-notes-list>
          <div class="state-empty"><p>加载中…</p></div>
        </section>
      </div>
    </div>
  </main>

  <footer class="footer" data-footer></footer>

  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
  <script src="js/search.js"></script>
  <script src="js/notes.js"></script>
</body>
</html>
