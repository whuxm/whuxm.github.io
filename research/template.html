<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Template · RS NOTES</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="stylesheet" href="../css/markdown.css" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />

  <script src="../config/site.config.js"></script>
</head>
<body>

  <!--
    项目详情页模板
    实际页面由 research/project.html + research-detail.js 动态渲染，
    本模板展示静态结构，供新增项目时参考。
  -->

  <header class="nav" data-nav></header>

  <main class="page">
    <div class="container">
      <article class="project">
        <div class="project-hero">
          <a class="note-back" href="../research.html">← Back to Research</a>
          <span class="eyebrow">ONGOING · 2026-01</span>
          <h1>Project Title</h1>
          <p style="margin-top:18px;max-width:640px;font-size:1.05rem;">项目简介，一到两句话概述研究内容与目标。</p>
          <div class="project-hero__cover">
            <img src="https://via.placeholder.com/1200x514/0a0a0a/fafafa?text=Cover" alt="cover" />
          </div>
          <div class="project-meta">
            <div class="project-meta__item"><span class="eyebrow">Status</span><span class="value">进行中</span></div>
            <div class="project-meta__item"><span class="eyebrow">Date</span><span class="value">2026-01</span></div>
            <div class="project-meta__item"><span class="eyebrow">Tags</span><span class="value">tag1 · tag2</span></div>
            <div class="project-meta__item"><span class="eyebrow">ID</span><span class="value mono">project-id</span></div>
          </div>
          <div class="card__tags" style="margin-bottom:32px;">
            <span class="tag">tag1</span>
            <span class="tag">tag2</span>
          </div>
          <div class="markdown">
            <h2>背景</h2>
            <p>正文内容使用 Markdown 编写，存放在 <code>data/research/index.json</code> 的 <code>content</code> 字段。</p>
            <h2>方法</h2>
            <p>支持 KaTeX 公式：$$E = mc^2$$</p>
            <pre><code class="language-javascript">function hello() {
  console.log('RS NOTES');
}</code></pre>
          </div>
        </div>
      </article>
    </div>
  </main>

  <footer class="footer" data-footer></footer>

  <script src="../js/utils.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/search.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script>
    // 模板静态渲染演示
    document.querySelectorAll('.markdown').forEach(el => {
      if (typeof renderMathInElement !== 'undefined') {
        renderMathInElement(el, {
          delimiters: [
            { left: '$$', right: '$$', display: true },
            { left: '$', right: '$', display: false }
          ],
          throwOnError: false
        });
      }
      if (typeof Prism !== 'undefined') Prism.highlightAllUnder(el);
    });
  </script>
</body>
</html>
